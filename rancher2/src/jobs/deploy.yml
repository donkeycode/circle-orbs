description: >
  Deploy a project to MKS with helm upgrade --install.
  Deploys the env-named image tag (preprod/prod, legacy syntax) and FORCES a rollout
  on that same tag via deployRevision=$CIRCLE_SHA1 (equivalent of rancher up --force-upgrade
  --pull). Optional per-env values file (values.<env>.yaml) is applied if present.

executor: default

parameters:
  project_name:
    type: string
    description: "Project / Helm release name (e.g. kinousassur)."
  env:
    type: string
    description: "Target env (e.g. preprod, prod). Used for the namespace and the optional values file."
  namespace:
    type: string
    description: "Target namespace (required, e.g. kinousassur-ppd). CircleCI interdit un default qui référence un autre paramètre."
  chart_path:
    type: string
    default: "deploy/chart"
    description: "Path to the Helm chart in the repo."
  image_repository:
    type: string
    description: "Full image repository to deploy (e.g. pqngjr40.gra7.container-registry.ovh.net/kinousassur/form)."
  image_tag:
    type: string
    default: ""
    description: "Image tag to deploy. Empty => defaults to <env> (preprod/prod), like legacy. Rollout is forced via deployRevision even if the tag is unchanged."
  release_name:
    type: string
    default: ""
    description: "Helm release name. Empty => defaults to the namespace value."
  kube_token_var:
    type: string
    default: ""
    description: "Project env var holding the SA token. Empty => KUBE_TOKEN_<ENV> (ppd/prod ne peuvent pas partager un seul KUBE_TOKEN sur le meme projet CircleCI)."

steps:
  - utils/install_git
  - run:
      name: Install openssh (checkout over ssh)
      command: apk add --no-cache openssh
  - checkout
  - kube_login:
      namespace: <<parameters.namespace>>
      env: <<parameters.env>>
      token_var: <<parameters.kube_token_var>>
  - run:
      name: Helm upgrade
      command: |
        set -e
        CHART="<<parameters.chart_path>>"
        # Un cluster Rancher/MKS expose BEAUCOUP de CRDs ; la phase de discovery de helm sature
        # alors le rate-limiter client-go ("client rate limiter Wait ... context deadline exceeded").
        # Le burst doit DÉPASSER le nb de group-versions interrogées (souvent >200 sur Rancher) :
        # on prend large (throttle CLIENT, l'API se protège seule via API Priority & Fairness).
        # Défauts surchargeables via le contexte/projet CircleCI.
        : "${HELM_BURST_LIMIT:=1000}"
        : "${HELM_QPS:=300}"
        export HELM_BURST_LIMIT HELM_QPS
        # Valeurs dérivées calculées ICI (un default de paramètre ne peut pas référencer un autre paramètre).
        TAG="<<parameters.image_tag>>"
        [ -z "$TAG" ] && TAG="<<parameters.env>>"
        RELEASE="<<parameters.release_name>>"
        [ -z "$RELEASE" ] && RELEASE="<<parameters.namespace>>"
        EXTRA=""
        if [ -f "$CHART/values.<<parameters.env>>.yaml" ]; then
          EXTRA="-f $CHART/values.<<parameters.env>>.yaml"
        fi
        helm upgrade --install --wait --cleanup-on-fail \
          "$RELEASE" "$CHART" \
          --namespace "<<parameters.namespace>>" \
          -f "$CHART/values.yaml" $EXTRA \
          --set image.repository="<<parameters.image_repository>>" \
          --set image.tag="$TAG" \
          --set deployRevision="$CIRCLE_SHA1"
