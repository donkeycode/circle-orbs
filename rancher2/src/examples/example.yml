description: >
  Deploy a project to MKS (preprod) after building/pushing its image to Harbor.
usage:
  version: 2.1
  orbs:
    rancher2: donkeycode/rancher2@0.0.5
  workflows:
    deploy:
      jobs:
        - rancher2/deploy:
            project_name: kinousassur
            env: preprod
            namespace: kinousassur-ppd
            image_repository: pqngjr40.gra7.container-registry.ovh.net/kinousassur/form
            # Contexte global 'mks' = KUBE_SERVER + KUBE_CA_B64. Le token vient des variables
            # d'env DU PROJET, suffixées par env (KUBE_TOKEN_PREPROD ici) : l'orb dérive
            # KUBE_TOKEN_<ENV> depuis 'env'. Pas de contexte mks-<projet>.
            context:
              - mks
