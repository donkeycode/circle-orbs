version: 2.1
description: |
    Deploy a project to Rancher 2 / managed Kubernetes (MKS) via Helm. Companion of the legacy donkeycode/rancher orb (Rancher 1), left untouched.
display:
    home_url: https://github.com/donkeycode/circle-orbs
    source_url: https://github.com/donkeycode/circle-orbs
orbs:
    utils: donkeycode/utils@0.0.2
commands:
    kube_login:
        description: |
            Build a kubeconfig from a scoped ServiceAccount token. Reads KUBE_SERVER / KUBE_CA_B64 (generic, cluster-wide — a global context like 'mks') and a per-ENV token from the CircleCI PROJECT env vars. Because preprod and prod share the SAME CircleCI project, the token cannot use a single name: by default this command resolves KUBE_TOKEN_<ENV> (e.g. KUBE_TOKEN_PREPROD / KUBE_TOKEN_PROD). Override the var name with `token_var`; falls back to the legacy KUBE_TOKEN if the per-env var is empty. Values come from the Terraform module mks_deployer. No admin kubeconfig.
        parameters:
            env:
                default: ""
                description: Target env (preprod/prod). Used to derive the token var name KUBE_TOKEN_<ENV> when token_var is empty.
                type: string
            namespace:
                description: Namespace the ServiceAccount is scoped to.
                type: string
            token_var:
                default: ""
                description: Explicit name of the project env var holding the SA token. Empty => KUBE_TOKEN_<ENV> (uppercased), then legacy KUBE_TOKEN as fallback.
                type: string
        steps:
            - run:
                command: |
                    set -e
                    : "${KUBE_SERVER:?KUBE_SERVER manquant — attache le contexte cluster (ex: mks) qui le porte}"
                    : "${KUBE_CA_B64:?KUBE_CA_B64 manquant — attache le contexte cluster (ex: mks) qui le porte}"

                    # Résolution du token : nom explicite (token_var) sinon KUBE_TOKEN_<ENV>. Un projet
                    # CircleCI = un seul jeu de variables → ppd et prod NE PEUVENT PAS partager 'KUBE_TOKEN'.
                    TOKEN_VAR="<<parameters.token_var>>"
                    if [ -z "$TOKEN_VAR" ] && [ -n "<<parameters.env>>" ]; then
                      ENV_UPPER=$(printf '%s' "<<parameters.env>>" | tr '[:lower:]' '[:upper:]')
                      TOKEN_VAR="KUBE_TOKEN_${ENV_UPPER}"
                    fi
                    TOKEN=""
                    if [ -n "$TOKEN_VAR" ]; then
                      eval "TOKEN=\${$TOKEN_VAR:-}"
                    fi
                    # Repli legacy : ancienne variable unique KUBE_TOKEN.
                    [ -z "$TOKEN" ] && TOKEN="${KUBE_TOKEN:-}"
                    : "${TOKEN:?Token absent — definir ${TOKEN_VAR:-KUBE_TOKEN_<ENV>} (KUBE_TOKEN_PREPROD / KUBE_TOKEN_PROD) dans les variables du PROJET CircleCI}"

                    echo "$KUBE_CA_B64" | base64 -d > /tmp/mks-ca.crt
                    kubectl config set-cluster mks \
                      --server="$KUBE_SERVER" \
                      --certificate-authority=/tmp/mks-ca.crt \
                      --embed-certs=true
                    kubectl config set-credentials deployer --token="$TOKEN"
                    kubectl config set-context mks \
                      --cluster=mks --user=deployer --namespace="<<parameters.namespace>>"
                    kubectl config use-context mks
                    kubectl version --output=yaml | head -n 20
                name: Configure kubectl from scoped ServiceAccount
executors:
    default:
        description: |
            Image with helm + kubectl (Alpine based, apk available for git/openssh).
        docker:
            - image: dtzar/helm-kubectl:3.14.4
jobs:
    deploy:
        description: |
            Deploy a project to MKS with helm upgrade --install. Deploys the env-named image tag (preprod/prod, legacy syntax) and FORCES a rollout on that same tag via deployRevision=$CIRCLE_SHA1 (equivalent of rancher up --force-upgrade --pull). Optional per-env values file (values.<env>.yaml) is applied if present.
        executor: default
        parameters:
            chart_path:
                default: deploy/chart
                description: Path to the Helm chart in the repo.
                type: string
            env:
                description: Target env (e.g. preprod, prod). Used for the namespace and the optional values file.
                type: string
            image_repository:
                description: Full image repository to deploy (e.g. pqngjr40.gra7.container-registry.ovh.net/kinousassur/form).
                type: string
            image_tag:
                default: ""
                description: Image tag to deploy. Empty => defaults to <env> (preprod/prod), like legacy. Rollout is forced via deployRevision even if the tag is unchanged.
                type: string
            kube_token_var:
                default: ""
                description: Project env var holding the SA token. Empty => KUBE_TOKEN_<ENV> (ppd/prod ne peuvent pas partager un seul KUBE_TOKEN sur le meme projet CircleCI).
                type: string
            namespace:
                description: Target namespace (required, e.g. kinousassur-ppd). CircleCI interdit un default qui référence un autre paramètre.
                type: string
            project_name:
                description: Project / Helm release name (e.g. kinousassur).
                type: string
            release_name:
                default: ""
                description: Helm release name. Empty => defaults to the namespace value.
                type: string
        steps:
            - utils/install_git
            - run:
                command: apk add --no-cache openssh
                name: Install openssh (checkout over ssh)
            - checkout
            - kube_login:
                env: <<parameters.env>>
                namespace: <<parameters.namespace>>
                token_var: <<parameters.kube_token_var>>
            - run:
                command: |
                    set -e
                    CHART="<<parameters.chart_path>>"
                    # Un cluster Rancher/MKS expose BEAUCOUP de CRDs ; la phase de discovery de helm sature
                    # alors le rate-limiter client-go ("client rate limiter Wait ... context deadline exceeded").
                    # Le burst doit DÉPASSER le nb de group-versions interrogées (souvent >200 sur Rancher) :
                    # on prend large (throttle CLIENT, l'API se protège seule via API Priority & Fairness).
                    # Défauts surchargeables via le contexte/projet CircleCI.
                    : "${HELM_BURST_LIMIT:=1000}"
                    : "${HELM_QPS:=300}"
                    export HELM_BURST_LIMIT HELM_QPS
                    # Valeurs dérivées calculées ICI (un default de paramètre ne peut pas référencer un autre paramètre).
                    TAG="<<parameters.image_tag>>"
                    [ -z "$TAG" ] && TAG="<<parameters.env>>"
                    RELEASE="<<parameters.release_name>>"
                    [ -z "$RELEASE" ] && RELEASE="<<parameters.namespace>>"
                    EXTRA=""
                    if [ -f "$CHART/values.<<parameters.env>>.yaml" ]; then
                      EXTRA="-f $CHART/values.<<parameters.env>>.yaml"
                    fi
                    helm upgrade --install --wait --cleanup-on-fail \
                      "$RELEASE" "$CHART" \
                      --namespace "<<parameters.namespace>>" \
                      -f "$CHART/values.yaml" $EXTRA \
                      --set image.repository="<<parameters.image_repository>>" \
                      --set image.tag="$TAG" \
                      --set deployRevision="$CIRCLE_SHA1"
                name: Helm upgrade
examples:
    example:
        description: |
            Deploy a project to MKS (preprod) after building/pushing its image to Harbor.
        usage:
            version: "2.1"
            orbs:
                rancher2: donkeycode/rancher2@0.0.4
            workflows:
                deploy:
                    jobs:
                        - rancher2/deploy:
                            context:
                                - mks
                            env: preprod
                            image_repository: pqngjr40.gra7.container-registry.ovh.net/kinousassur/form
                            namespace: kinousassur-ppd
                            project_name: kinousassur

